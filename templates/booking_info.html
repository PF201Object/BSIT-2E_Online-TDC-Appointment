{% extends "booking_step.html" %}
{% set step = 2 %}
{% block step_content %}
<h2 style="color: #043b50; margin-bottom: 30px;">Your Information</h2>

<form method="POST" action="{{ url_for('booking_vehicle') }}">
    <div style="background: #f5fcff; border-radius: 30px; padding: 30px;">
        <div style="margin-bottom: 20px;">
            <label style="color: #0f5e7a; font-weight: 600; display: block; margin-bottom: 8px;">Full Name</label>
            <input type="text" name="full_name" class="form-control" value="{{ user.full_name or user.username }}" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: #0f5e7a; font-weight: 600; display: block; margin-bottom: 8px;">Email Address</label>
            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: #0f5e7a; font-weight: 600; display: block; margin-bottom: 8px;">Contact Number</label>
            <input type="text" name="contact_number" class="form-control" value="{{ user.phone or '' }}" required>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="color: #0f5e7a; font-weight: 600; display: block; margin-bottom: 8px;">Select Location</label>
            <select name="location" class="form-control">
                <option value="Tullisoy City, EcoDrive">Tullisoy City, EcoDrive</option>
                <option value="Mingionillo City, EcoDrive">Mingionillo City, EcoDrive</option>
            </select>
        </div>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 30px;">
        <a href="{{ url_for('booking') }}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        <button type="submit" class="btn-primary">
            Continue to Vehicle <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</form>
{% endblock %}
